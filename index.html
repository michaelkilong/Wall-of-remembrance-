<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Leave a note, share a memory, honor someone. No sign-in required.">
  <meta name="theme-color" content="#0D0B09">
  <title>Diary Dump</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="viewport">
    <div id="wall">
      <div class="empty-state" id="emptyState">
        <h3>The wall is quiet</h3>
        <p>Be the first to leave a note</p>
      </div>
      <div class="loader hidden" id="loader"></div>
    </div>
  </div>

  <!-- Ghost preview note that follows the cursor in place mode -->
  <div id="ghost" class="note ghost hidden note-cream" style="--r:0deg;">
    <div class="note-name">Your Name</div>
    <div class="note-message">Preview</div>
  </div>

  <!-- Main UI overlay -->
  <div class="ui">
    <div class="header">
      <h1>Diary Dump</h1>
      <p>Write it down, let it go. Someone will find it someday</p>
    </div>
    <div class="place-hint hidden" id="placeHint">Click anywhere on the wall to place your note</div>
    <div class="toolbar">
      <button class="tool-btn primary" id="btnAdd">+ Add Note</button>
      <div class="divider"></div>
      <button class="tool-btn" id="btnZoomOut" aria-label="Zoom out">−</button>
      <span class="zoom-text" id="zoomDisplay">25%</span>
      <button class="tool-btn" id="btnZoomIn" aria-label="Zoom in">+</button>
      <div class="divider"></div>
      <button class="tool-btn" id="btnReset" title="Reset View" aria-label="Reset view">⌂</button>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <!-- Write Note Modal -->
  <div id="modalOverlay" class="overlay hidden" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal" id="modalBox">
      <button class="modal-close" id="modalCloseBtn" aria-label="Close">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <path d="M18 6L6 18M6 6l12 12"/>
        </svg>
      </button>
      <h2 id="modalTitle">Write a Note</h2>
      <p>Share a memory, a thought, or a tribute.</p>

      <div class="form-group">
        <label for="inputName">Your Name</label>
        <input
          type="text"
          id="inputName"
          maxlength="50"
          placeholder="Enter your name"
          autocomplete="off"
          spellcheck="false"
          autocapitalize="words"
        >
        <div class="error-text" id="nameError">Please enter your name</div>
      </div>

      <div class="form-group">
        <label for="inputFor">This note is for <span class="label-optional">(optional)</span></label>
        <input
          type="text"
          id="inputFor"
          maxlength="50"
          placeholder="Who are you remembering?"
          autocomplete="off"
          spellcheck="false"
          autocapitalize="words"
        >
      </div>

      <div class="form-group">
        <label for="inputMessage">Your Message</label>
        <textarea
          id="inputMessage"
          maxlength="500"
          placeholder="Write your note here..."
          spellcheck="false"
          autocomplete="off"
          autocapitalize="sentences"
        ></textarea>
        <div class="char-count"><span id="charCount">0</span>/500</div>
        <div class="error-text" id="msgError">Please write a message</div>
      </div>

      <div class="modal-actions">
        <button class="btn-secondary" id="btnCancel" type="button">Cancel</button>
        <button class="btn-primary" id="btnSubmit" type="button">Place on Wall</button>
      </div>
    </div>
  </div>

  <!-- Note Detail View -->
  <div id="detailOverlay" class="overlay hidden" role="dialog" aria-modal="true" aria-label="Note detail">
    <div class="detail-card" id="detailCard" style="--r:0deg;">
      <button class="detail-close" id="detailCloseBtn" aria-label="Close">×</button>
      <div class="detail-name" id="detailName"></div>
      <div class="detail-message" id="detailMessage"></div>
      <div class="detail-for" id="detailFor"></div>
      <div class="detail-date" id="detailDate"></div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
